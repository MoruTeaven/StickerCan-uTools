<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新记录 - 表情罐头</title>
    <link href="lib/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .changelog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .changelog-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--accent-color);
            background: var(--bg-tertiary);
        }

        .back-btn .mdi {
            font-size: 20px;
        }

        .changelog-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .changelog-header h1 .mdi {
            font-size: 28px;
        }

        .changelog-timeline {
            position: relative;
            padding-left: 30px;
        }

        .changelog-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--border-color);
            border-radius: 2px;
        }

        .changelog-version {
            position: relative;
            margin-bottom: 35px;
        }

        .changelog-version::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 8px;
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 3px var(--accent-color);
        }

        .version-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .version-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--accent-color);
            color: var(--inverse-text);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .version-tag .mdi {
            font-size: 16px;
        }

        .version-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .version-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .version-changes {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .change-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .change-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .change-item:first-child {
            padding-top: 0;
        }

        .change-type {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .change-type.new {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .change-type.improve {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .change-type.fix {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .change-type.remove {
            background: rgba(107, 114, 128, 0.15);
            color: #6b7280;
        }

        .change-type .mdi {
            font-size: 14px;
            margin-right: 4px;
        }

        .change-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
        }

        @media (max-width: 768px) {
            .changelog-container {
                padding: 15px;
            }

            .changelog-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .changelog-header h1 {
                font-size: 20px;
            }

            .version-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .change-item {
                flex-direction: column;
                gap: 8px;
            }

            .change-type {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="changelog-container">
        <div class="changelog-header">
            <a href="index.html" class="back-btn">
                <i class="mdi mdi-arrow-left"></i>
                <span>返回</span>
            </a>
            <h1>
                <i class="mdi mdi-history"></i>
                更新记录
            </h1>
        </div>

        <div class="changelog-timeline">
            <div class="changelog-version">
                <div class="version-header">
                    <span class="version-tag">
                        <i class="mdi mdi-new-box"></i>
                        v1.0.0
                    </span>
                    <span class="version-date">2025-05-15</span>
                </div>
                <h3 class="version-title">首次发布</h3>
                <div class="version-changes">
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">表情包列表展示，支持网格视图浏览所有表情包</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">标签管理系统，可为表情包添加、编辑、删除标签</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">URL 添加表情包，直接输入网络图片地址快速添加</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">剪贴板复制功能，双击或点击按钮快速复制表情到剪贴板</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">聚合搜索功能，集成多个表情包搜索平台</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">本地存储支持，本地表情不会同步到其他设备</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type new">
                            <i class="mdi mdi-plus-circle"></i>
                            新功能
                        </span>
                        <span class="change-desc">暗色/浅色主题切换，支持跟随系统自动切换</span>
                    </div>
                    <div class="change-item">
                        <span class="change-type improve">
                            <i class="mdi mdi-check-circle"></i>
                            优化
                        </span>
                        <span class="change-desc">采用 Material Design Icons 图标库，界面美观统一</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
